<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City RP | Emden </title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-rgb: 59, 130, 246; 
            --bg: #05070a;
            --card-bg: rgba(var(--primary-rgb), 0.05); 
            --border: rgba(var(--primary-rgb), 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            transition: all 0.4s ease;
        }

        /* Static Navigation - Bleibt oben am Anfang der Seite */
        nav {
            position: absolute; 
            top: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1200px; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(25px); 
            background: rgba(15, 23, 42, 0.7);
            z-index: 1000; border-radius: 24px; border: 1px solid var(--border);
            transition: border 0.4s ease;
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; border-right: 1px solid var(--border); padding-right: 20px; }
        .logo b { color: var(--primary); }
        
        .nav-links { display: flex; gap: 12px; }
        .nav-links a { 
            text-decoration: none; color: var(--text-muted); font-size: 0.65rem; 
            font-weight: 700; text-transform: uppercase; padding: 10px 16px;
            border-radius: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-links a:hover { 
            background: var(--primary); color: white; border-color: transparent;
            transform: translateY(-2px);
        }

        .controls { display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
        .design-toggle { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; padding: 5px; transition: 0.3s; }
        .design-toggle:hover { color: var(--primary); transform: rotate(15deg); }
        .lang-btn { background: var(--primary); border: none; color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 0.65rem; font-weight: 800; transition: 0.3s; }

        /* Design Panel */
        .design-panel {
            position: fixed; top: 90px; right: 2.5%; width: 280px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px; padding: 20px;
            z-index: 2000; display: none; flex-direction: column; gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .design-panel.active { display: flex; animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-header { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: var(--primary); }
        .panel-header button { background: none; border: none; color: var(--text-muted); cursor: pointer; }
        .panel-section p { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .color-presets { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .dot { width: 24px; height: 24px; border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        #customColor { background: none; border: none; width: 28px; height: 28px; cursor: pointer; }

        .effect-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); color: white; border-radius: 12px; cursor: pointer; 
            font-size: 0.65rem; font-weight: 700; transition: 0.3s; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .effect-btn:hover { background: var(--primary); }
        .effect-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        /* RGB Global Animation */
        @keyframes rainbow-flow {
            0% { --primary: #3b82f6; --primary-rgb: 59, 130, 246; }
            33% { --primary: #10b981; --primary-rgb: 16, 185, 129; }
            66% { --primary: #ef4444; --primary-rgb: 239, 68, 68; }
            100% { --primary: #3b82f6; --primary-rgb: 59, 130, 246; }
        }
        .rgb-active { animation: rainbow-flow 4s infinite linear !important; }

        /* Hero */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 140px 20px 60px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); margin-bottom: 20px; font-weight: 200; letter-spacing: -2px; }
        .hero h1 b { color: var(--primary); font-weight: 800; transition: color 0.4s ease; }
        .hero-sub { max-width: 650px; color: var(--text-muted); font-size: 1.05rem; margin-bottom: 40px; }

        .btn-discord {
            padding: 18px 38px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 18px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 12px; transition: 0.4s;
        }
        .btn-discord:hover { transform: translateY(-5px); box-shadow: 0 10px 30px var(--primary); }

        .disclaimer-small {
            margin-top: 50px; padding: 12px 20px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
            max-width: 550px; display: flex; align-items: center; gap: 12px;
            transition: border 0.4s ease;
        }

        /* Grid & Cards */
        .section { padding: 80px 10%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); 
            border: 1px solid var(--border);
            padding: 35px; border-radius: 28px; transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); opacity: 0; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); background: rgba(var(--primary-rgb), 0.1); }
        .card:hover::before { opacity: 1; }
        .card i { color: var(--primary); margin-bottom: 20px; display: block; transition: color 0.4s ease; }
        .card h3 { margin-bottom: 12px; font-weight: 800; font-size: 1.1rem; }

        .fade { opacity: 0; transform: translateY(40px); transition: 1.2s ease-out; }
        .fade.show { opacity: 1; transform: translateY(0); }

        footer { padding: 60px; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body id="main-body">

    <nav>
        <div class="nav-left">
            <div class="logo">CITY<b>RP</b></div>
            <div class="nav-links">
                <a href="team.html">Team <i data-lucide="arrow-right" size="12"></i></a>
                <a href="https://discord.gg/ApWaHQMPNK" target="_blank">Discord <i data-lucide="arrow-right" size="12"></i></a>
            </div>
        </div>
        <div class="controls">
            <button class="lang-btn" onclick="toggleLang()">DE / EN</button>
            <button class="design-toggle" onclick="toggleDesignPanel()">
                <i data-lucide="palette" size="18"></i>
            </button>
        </div>
    </nav>

    <div id="design-panel" class="design-panel">
        <div class="panel-header">
            <span id="p-title">Design Customizer</span>
            <button onclick="toggleDesignPanel()"><i data-lucide="x" size="16"></i></button>
        </div>
        <div class="panel-section">
            <p id="p-color">Farbe wählen</p>
            <div class="color-presets">
                <div class="dot" style="background:#3b82f6" onclick="changeColor('#3b82f6')"></div>
                <div class="dot" style="background:#10b981" onclick="changeColor('#10b981')"></div>
                <div class="dot" style="background:#ef4444" onclick="changeColor('#ef4444')"></div>
                <div class="dot" style="background:#f59e0b" onclick="changeColor('#f59e0b')"></div>
                <input type="color" id="customColor" oninput="changeColor(this.value)">
            </div>
        </div>
        <div class="panel-section">
            <p id="p-effects">Effekte</p>
            <button class="effect-btn disabled" title="Kommt bald">Mixed Flow (Bald) <i data-lucide="lock" size="14"></i></button>
            <button class="effect-btn" onclick="setEffect('rainbow')">RGB Wave <i data-lucide="activity" size="14"></i></button>
            <button class="effect-btn" onclick="stopEffects()">Reset <i data-lucide="refresh-cw" size="14"></i></button>
        </div>
    </div>

    <section class="hero">
        <h1 class="fade">CITY RP<br><b id="main-title">EMDEN PRIVAT</b></h1>
        <p class="hero-sub fade" id="hero-desc">Wir sind eine private Roleplay Community in Emergency Emden.</p>
        <a href="https://discord.gg/ApWaHQMPNK" class="btn-discord fade" target="_blank"><i data-lucide="message-square"></i> Discord Server</a>
        <div class="disclaimer-small fade">
            <i data-lucide="info" style="color: var(--primary);" size="18"></i>
            <p id="disclaimer-text"><b>Hinweis:</b> Kein offizielles Projekt von Emergency Emden.</p>
        </div>
    </section>

    <section class="section">
        <div class="grid" id="card-grid"></div>
    </section>

    <footer>&copy; 2026 CITY RP COMMUNITY</footer>

    <script>
        lucide.createIcons();

        function toggleDesignPanel() {
            document.getElementById('design-panel').classList.toggle('active');
        }

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + "," + parseInt(result[2], 16) + "," + parseInt(result[3], 16) 
                : "59, 130, 246";
        }

        function changeColor(hex) {
            stopEffects();
            document.documentElement.style.setProperty('--primary', hex);
            document.documentElement.style.setProperty('--primary-rgb', hexToRgb(hex));
        }

        function setEffect(type) {
            stopEffects();
            if(type === 'rainbow') {
                document.getElementById('main-body').classList.add('rgb-active');
            }
        }

        function stopEffects() {
            document.getElementById('main-body').classList.remove('rgb-active');
            document.documentElement.style.setProperty('--primary', '#3b82f6');
            document.documentElement.style.setProperty('--primary-rgb', "59, 130, 246");
        }

        const cardData = {
            'DE': [
                { icon: 'shield', t: 'Polizei RP', p: 'Realistische Streifenfahrten in Emden.' },
                { icon: 'flame', t: 'Feuerwehr', p: 'Einsätze mit koordinierten Teams.' },
                { icon: 'ambulance', t: 'Rettungsdienst', p: 'Schnelle medizinische Hilfe.' },
                { icon: 'car', t: 'Zivilisten', p: 'Gestalte dein eigenes Leben.' },
                { icon: 'zap', t: 'Kriminalität', p: 'Illegale Geschäfte – lass dich nicht erwischen.' },
                { icon: 'bus', t: 'Transport', p: 'Fahre Bürger sicher an ihr Ziel.' },
                { icon: 'calendar', t: 'Events', p: 'Regelmäßige Groß-Events.' }
            ],
            'EN': [
                { icon: 'shield', t: 'Police RP', p: 'Realistic patrols in Emden.' },
                { icon: 'flame', t: 'Fire Dept', p: 'Operations with coordinated teams.' },
                { icon: 'ambulance', t: 'Rescue Dept', p: 'Fast medical assistance.' },
                { icon: 'car', t: 'Civilians', p: 'Shape your own life.' },
                { icon: 'zap', t: 'Crime', p: 'Illegal business – don’t get caught.' },
                { icon: 'bus', t: 'Transport', p: 'Drive citizens safely.' },
                { icon: 'calendar', t: 'Events', p: 'Regular major events.' }
            ]
        };

        function renderCards(lang) {
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            cardData[lang].forEach(card => {
                const div = document.createElement('div');
                div.className = 'card fade show';
                div.innerHTML = `<i data-lucide="${card.icon}" size="32"></i><h3>${card.t}</h3><p>${card.p}</p>`;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        let currentLang = 'DE';
        function toggleLang() {
            currentLang = currentLang === 'DE' ? 'EN' : 'DE';
            const texts = {
                'DE': { title: 'EMDEN PRIVAT', desc: 'Wir sind eine private Roleplay Community.', disclaim: '<b>Hinweis:</b> Kein offizielles Projekt.', pTitle: 'Design Customizer', pColor: 'Farbe wählen', pEffects: 'Effekte' },
                'EN': { title: 'EMDEN PRIVATE', desc: 'We are a private roleplay community.', disclaim: '<b>Note:</b> Not an official project.', pTitle: 'Design Customizer', pColor: 'Choose Color', pEffects: 'Effects' }
            };
            document.getElementById('main-title').innerText = texts[currentLang].title;
            document.getElementById('hero-desc').innerText = texts[currentLang].desc;
            document.getElementById('disclaimer-text').innerHTML = texts[currentLang].disclaim;
            document.getElementById('p-title').innerText = texts[currentLang].pTitle;
            document.getElementById('p-color').innerText = texts[currentLang].pColor;
            document.getElementById('p-effects').innerText = texts[currentLang].pEffects;
            renderCards(currentLang);
        }

        renderCards('DE');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade').forEach(el => observer.observe(el));
    </script>
</body>
</html>
